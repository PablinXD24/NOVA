<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA - Admin</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --glass-bg: rgba(15, 15, 15, 0.7);
            --glass-border: rgba(255, 255, 255, 0.18);
            --glass-highlight: rgba(255, 255, 255, 0.08);
            --accent-color: #ffffff;
            --color-1: #2C5067; --color-2: #3BA6A6; --color-3: #50BF58; --color-4: #F2CA52; --color-5: #F23839;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none !important; scroll-behavior: smooth; }
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; overflow-x: hidden; width: 100%; }

        /* --- ESTILO NOVO: BOTÃO LOGIN & ADMIN --- */
        .admin-controls {
            position: fixed; top: 20px; right: 20px; z-index: 2001; display: flex; gap: 10px;
        }
        .btn-admin {
            background: var(--glass-bg); backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border); color: #fff;
            padding: 8px 15px; border-radius: 20px; font-size: 0.7rem;
            letter-spacing: 1px; text-transform: uppercase; transition: 0.3s;
        }
        .btn-admin:hover { background: rgba(255,255,255,0.1); }
        .admin-only { display: none; } /* Escondido por padrão */

        #admin-form-container {
            width: 100%; max-width: 500px; margin: 20px auto;
            background: var(--glass-bg); padding: 20px; border-radius: 20px;
            border: 1px solid var(--glass-border);
        }
        input, textarea, select {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            color: #fff; padding: 10px; margin-bottom: 10px; border-radius: 8px; font-family: inherit;
        }

        /* --- MANTENDO TODOS OS ESTILOS ORIGINAIS --- */
        .top-sidebar { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; display: flex; gap: 40px; padding: 10px 20px; }
        .nav-item { position: relative; display: flex; flex-direction: column; align-items: center; text-decoration: none; }
        .nav-star { width: 24px; height: 24px; transition: transform 0.3s ease; }
        .nav-item:hover .nav-star { transform: scale(1.4) rotate(90deg); }
        .nav-label { position: absolute; top: 35px; font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase; opacity: 0; white-space: nowrap; transition: opacity 0.3s ease; pointer-events: none; color: #fff; }
        .nav-item:hover .nav-label { opacity: 1; }
        #custom-cursor { position: fixed; width: 24px; height: 24px; fill: var(--accent-color); pointer-events: none; z-index: 9999; transform: translate(-50%, -50%); filter: drop-shadow(0 0 8px rgba(255,255,255,0.8)); transition: transform 0.1s ease-out; }
        #bg-container { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; z-index: -1; background-color: #000; }
        section { min-height: 100vh; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; padding: 80px 20px; opacity: 0; transform: translateY(30px); transition: opacity 1.2s ease, transform 1.2s ease; }
        section.section-visible { opacity: 1; transform: translateY(0); }
        .logo-container img { width: 450px; max-width: 90%; height: auto; filter: drop-shadow(0 0 20px rgba(255,255,255,0.1)); }
        
        /* CARROSSEL & CARDS */
        .carousel-wrapper { width: 100%; overflow: hidden; position: relative; -webkit-mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent); mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent); }
        .carousel-container { display: flex; gap: 25px; overflow-x: auto; padding: 40px 5vw; scrollbar-width: none; user-select: none; }
        .log-card { min-width: 300px; width: 80vw; max-width: 320px; height: 420px; background: var(--glass-bg); backdrop-filter: blur(45px) saturate(210%); border: 1.5px solid var(--glass-border); border-radius: 28px; padding: 25px; display: flex; flex-direction: column; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); position: relative; overflow: hidden; flex-shrink: 0; }
        .card-1 { --card-glow: var(--color-1); box-shadow: 0 10px 30px rgba(44, 80, 103, 0.2); }
        .card-2 { --card-glow: var(--color-2); box-shadow: 0 10px 30px rgba(59, 166, 166, 0.2); }
        .card-3 { --card-glow: var(--color-3); box-shadow: 0 10px 30px rgba(80, 191, 88, 0.2); }
        .card-4 { --card-glow: var(--color-4); box-shadow: 0 10px 30px rgba(242, 202, 82, 0.2); }
        .card-5 { --card-glow: var(--color-5); box-shadow: 0 10px 30px rgba(242, 56, 57, 0.2); }
        .delete-btn { position: absolute; top: 10px; right: 10px; background: var(--color-5); border: none; color: white; border-radius: 50%; width: 25px; height: 25px; cursor: pointer !important; font-size: 10px; z-index: 10; }

        /* GANTT */
        .gantt-wrapper { width: 95%; max-width: 1000px; background: var(--glass-bg); backdrop-filter: blur(40px); border: 1.5px solid var(--glass-border); border-radius: 24px; padding: 30px; }
        .gantt-row { display: flex; align-items: center; height: 35px; position: relative; margin-bottom: 10px;}
        .gantt-task-name { width: 110px; font-size: 0.75rem; opacity: 0.8; }
        .gantt-bar-area { flex: 1; position: relative; height: 14px; background: rgba(255,255,255,0.03); border-radius: 20px; }
        .gantt-bar { position: absolute; height: 100%; border-radius: 20px; background: var(--bar-color); box-shadow: 0 0 15px var(--bar-color); transition: 0.4s; z-index: 5; }

        /* SOBRE & ANEL */
        .story-deck { position: relative; width: 240px; height: 340px; perspective: 1000px; }
        .story-card { position: absolute; width: 100%; height: 100%; background: var(--glass-bg); border: 1.5px solid var(--glass-border); border-radius: 20px; overflow: hidden; transition: 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); transform-origin: center bottom; }
        .story-card img { width: 100%; height: 100%; object-fit: cover; }
        .contact-3d-scene { position: relative; width: 100%; height: 600px; display: flex; align-items: center; justify-content: center; perspective: 3000px; overflow: hidden; }
        .ring-master { position: absolute; width: 100%; height: 100%; transform-style: preserve-3d; animation: rotateRing 35s linear infinite; }
        .ring-face { position: absolute; width: 88px; height: 380px; left: 50%; top: 50%; margin-left: -44px; margin-top: -190px; border-top: 1.5px solid var(--glass-border); border-bottom: 1.5px solid var(--glass-border); }

        @keyframes rotateRing { from { transform: rotateY(0deg) rotateX(8deg); } to { transform: rotateY(360deg) rotateX(8deg); } }

        /* MODAL */
        #modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); z-index: 2000; display: none; align-items: center; justify-content: center; opacity: 0; transition: 0.3s; }
        .modal-content { background: var(--glass-bg); backdrop-filter: blur(50px); border: 1.5px solid var(--glass-border); padding: 40px; border-radius: 32px; max-width: 600px; width: 100%; transform: scale(0.9); transition: 0.3s; text-align: center; }
        #modal-overlay.active { display: flex; opacity: 1; }
        #modal-overlay.active .modal-content { transform: scale(1); }

        @media (max-width: 768px) {
            #custom-cursor { display: none; }
            * { cursor: auto !important; }
            .top-sidebar { gap: 10px; width: 90%; }
            .nav-label { display: none; }
        }
    </style>
</head>
<body>

    <svg id="custom-cursor" viewBox="0 0 24 24"><path d="M12 0L14.5 9.5L24 12L14.5 14.5L12 24L9.5 14.5L0 12L9.5 9.5L12 0Z" /></svg>

    <div class="admin-controls">
        <button class="btn-admin" id="login-btn" onclick="login()">Login Admin</button>
        <button class="btn-admin admin-only" id="logout-btn" onclick="logout()">Sair</button>
    </div>

    <nav class="top-sidebar">
        <a href="#home" class="nav-item">
            <svg class="nav-star" viewBox="0 0 24 24" style="fill: var(--color-1);"><path d="M12 0L14.5 9.5L24 12L14.5 14.5L12 24L9.5 14.5L0 12L9.5 9.5L12 0Z" /></svg>
            <span class="nav-label">Home</span>
        </a>
        <a href="#diario" class="nav-item">
            <svg class="nav-star" viewBox="0 0 24 24" style="fill: var(--color-2);"><path d="M12 0L14.5 9.5L24 12L14.5 14.5L12 24L9.5 14.5L0 12L9.5 9.5L12 0Z" /></svg>
            <span class="nav-label">Diário</span>
        </a>
        <a href="#projetos" class="nav-item">
            <svg class="nav-star" viewBox="0 0 24 24" style="fill: var(--color-3);"><path d="M12 0L14.5 9.5L24 12L14.5 14.5L12 24L9.5 14.5L0 12L9.5 9.5L12 0Z" /></svg>
            <span class="nav-label">Projetos</span>
        </a>
        <a href="#sobre" class="nav-item">
            <svg class="nav-star" viewBox="0 0 24 24" style="fill: var(--color-4);"><path d="M12 0L14.5 9.5L24 12L14.5 14.5L12 24L9.5 14.5L0 12L9.5 9.5L12 0Z" /></svg>
            <span class="nav-label">Sobre</span>
        </a>
        <a href="#contato" class="nav-item">
            <svg class="nav-star" viewBox="0 0 24 24" style="fill: var(--color-5);"><path d="M12 0L14.5 9.5L24 12L14.5 14.5L12 24L9.5 14.5L0 12L9.5 9.5L12 0Z" /></svg>
            <span class="nav-label">Contato</span>
        </a>
    </nav>

    <div id="bg-container"></div>

    <div class="content-wrapper">
        <section id="home">
            <div class="logo-container"><img src="novalogo" alt="NOVA"></div>
        </section>

        <section id="diario">
            <h2 style="margin-bottom: 30px; font-weight: 200; letter-spacing: 5px; text-align: center;">DIÁRIO DE BORDO</h2>
            
            <div id="admin-form-container" class="admin-only">
                <h3 style="margin-bottom:15px; font-size: 0.8rem; letter-spacing:2px;">NOVO REGISTRO</h3>
                <input type="text" id="post-title" placeholder="Título da Fase">
                <textarea id="post-desc" placeholder="Descrição do desenvolvimento..."></textarea>
                <select id="post-color">
                    <option value="card-1">Cor 1 (Azul)</option>
                    <option value="card-2">Cor 2 (Ciano)</option>
                    <option value="card-3">Cor 3 (Verde)</option>
                    <option value="card-4">Cor 4 (Amarelo)</option>
                    <option value="card-5">Cor 5 (Vermelho)</option>
                </select>
                <button class="btn-admin" onclick="savePost()" style="width:100%">Publicar no Database</button>
            </div>

            <div class="carousel-wrapper">
                <div class="carousel-container" id="carousel">
                    </div>
            </div>
        </section>

        <section id="projetos">
            <h2 style="margin-bottom: 40px; font-weight: 200; letter-spacing: 5px; text-align: center;">CRONOGRAMA</h2>
            <div class="gantt-wrapper">
                <div class="gantt-container">
                    <div class="gantt-row"><div class="gantt-task-name">UI/UX</div><div class="gantt-bar-area"><div class="gantt-bar" style="width: 25%; left: 0%; --bar-color: var(--color-1);"></div></div></div>
                    <div class="gantt-row"><div class="gantt-task-name">ENGINE</div><div class="gantt-bar-area"><div class="gantt-bar" style="width: 40%; left: 15%; --bar-color: var(--color-2);"></div></div></div>
                    <div class="gantt-row"><div class="gantt-task-name">DATA</div><div class="gantt-bar-area"><div class="gantt-bar" style="width: 30%; left: 45%; --bar-color: var(--color-3);"></div></div></div>
                    <div class="gantt-row"><div class="gantt-task-name">TESTS</div><div class="gantt-bar-area"><div class="gantt-bar" style="width: 20%; left: 70%; --bar-color: var(--color-4);"></div></div></div>
                    <div class="gantt-row"><div class="gantt-task-name">DEPLOY</div><div class="gantt-bar-area"><div class="gantt-bar" style="width: 10%; left: 90%; --bar-color: var(--color-5);"></div></div></div>
                </div>
            </div>
        </section>

        <section id="sobre">
            <div class="sobre-container">
                <div class="story-deck" id="story-deck">
                    <div class="story-card" data-state="deck" onclick="handleCardClick(this)"><img src="pablo.png" alt="Pablo"></div>
                    <div class="story-card" data-state="deck" onclick="handleCardClick(this)"><img src="bianca.png" alt="Bianca"></div>
                </div>
            </div>
        </section>

        <section id="contato">
            <div class="contact-3d-scene">
                <div class="motivation-core"><h2>MOTIVAÇÃO</h2><p style="font-size: 0.6rem; letter-spacing: 5px; opacity: 0.5;">PABLO S. NOVA</p></div>
                <div class="ring-master" id="image-ring"></div>
            </div>
        </section>
    </div>

    <div id="modal-overlay" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 id="modal-title"></h2>
            <p id="modal-text"></p>
        </div>
    </div>

    <script>
        // --- CONFIGURAÇÃO FIREBASE ---
        const firebaseConfig = {
            apiKey: "SUA_API_KEY",
            authDomain: "SEU_PROJETO.firebaseapp.com",
            databaseURL: "https://SEU_PROJETO-default-rtdb.firebaseio.com",
            projectId: "SEU_PROJETO",
            storageBucket: "SEU_PROJETO.appspot.com",
            messagingSenderId: "SENDER_ID",
            appId: "APP_ID"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        const ADMIN_EMAIL = "pablo11ssousa2@gmail.com";
        let isAdmin = false;

        // --- AUTH FUNCTIONS ---
        function login() { auth.signInWithPopup(provider); }
        function logout() { auth.signOut(); location.reload(); }

        auth.onAuthStateChanged(user => {
            if (user && user.email === ADMIN_EMAIL) {
                isAdmin = true;
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
                document.getElementById('login-btn').style.display = 'none';
            }
            loadPosts();
        });

        // --- DATABASE FUNCTIONS ---
        function savePost() {
            const title = document.getElementById('post-title').value;
            const desc = document.getElementById('post-desc').value;
            const color = document.getElementById('post-color').value;
            if(!title || !desc) return alert("Preencha tudo!");

            db.ref('diario').push({
                title, desc, color,
                date: new Date().toLocaleDateString('pt-BR', {day:'2-digit', month:'short'}),
                timestamp: Date.now()
            });
            document.getElementById('post-title').value = '';
            document.getElementById('post-desc').value = '';
        }

        function deletePost(id) {
            if(confirm("Excluir este registro?")) db.ref(`diario/${id}`).remove();
        }

        function loadPosts() {
            db.ref('diario').on('value', snapshot => {
                const container = document.getElementById('carousel');
                container.innerHTML = '';
                snapshot.forEach(child => {
                    const data = child.val();
                    const id = child.key;
                    const card = document.createElement('div');
                    card.className = `log-card ${data.color}`;
                    card.onclick = () => openModalData(data.title, data.desc);
                    card.innerHTML = `
                        ${isAdmin ? `<button class="delete-btn" onclick="event.stopPropagation(); deletePost('${id}')">X</button>` : ''}
                        <div class="card-header"><span>${data.date}</span><span class="card-fase">Registro</span></div>
                        <h2>${data.title}</h2>
                        <p>${data.desc}</p>
                        <div class="card-footer">Autor: Pablo</div>
                    `;
                    container.appendChild(card);
                });
            });
        }

        // --- MANTENDO LÓGICA ORIGINAL DE UI ---
        const cursor = document.getElementById('custom-cursor');
        const carousel = document.getElementById('carousel');
        const observer = new IntersectionObserver(entries => {
            entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('section-visible'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('section').forEach(s => observer.observe(s));

        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        function openModalData(t, d) {
            document.getElementById('modal-title').innerText = t;
            document.getElementById('modal-text').innerText = d;
            document.getElementById('modal-overlay').classList.add('active');
        }
        function closeModal() { document.getElementById('modal-overlay').classList.remove('active'); }

        // Anel 3D e Carrossel (Lógica simplificada para manter performance)
        let autoScroll = setInterval(() => {
            if(carousel.scrollWidth > carousel.clientWidth) {
                carousel.scrollLeft += 1;
                if(carousel.scrollLeft >= (carousel.scrollWidth - carousel.clientWidth)) carousel.scrollLeft = 0;
            }
        }, 30);

        // Gerar Anel (Exemplo com 12 faces para leveza)
        const ring = document.getElementById('image-ring');
        for(let i=0; i<12; i++) {
            const face = document.createElement('div');
            face.className = 'ring-face';
            face.style.transform = `rotateY(${i * 30}deg) translateZ(400px)`;
            face.style.background = `rgba(255,255,255,0.05)`;
            face.style.border = "1px solid var(--glass-border)";
            ring.appendChild(face);
        }
    </script>
</body>
</html>
